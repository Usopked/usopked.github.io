<!DOCTYPE html>
<html>
<head>
    <title>Introducing myself</title>
    <link rel="stylesheet" type="text/css" href="script.css">
</head>
<body>
    <h1>USOPKED</h1>
    <div id="todoList">
        <input type="text" id="todoInput" placeholder="dayly list..." />
        <input type="date" id="todoDate" />
        <button onclick="newTodo()">PLUS</button>
        <ul id="todoItems"></ul>
        <button onclick="clearAll()">모든 항목 삭제</button>

        <script>
        function clearAll() {
            localStorage.clear();
            location.reload(); // 페이지를 새로고침하여 모든 항목을 화면에서 제거
        }
        </script>
    </div>
    <script src="script.js"></script>
</body>
</html>
